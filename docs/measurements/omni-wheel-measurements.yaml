section_7_calibration:                   # wheel-only testbed experiments, in protocol order
  roller_spin_down:
    decay_type: ""                       # str — "constant-decel" (frictionloss) or "exponential" (damping)
    fitted_frictionloss_Nm: 0.0          # float
    fitted_damping_Nm_per_rad_s: 0.0     # float
  driven_wheel_spin_down:
    fitted_hub_frictionloss_Nm: 0.0      # float
    fitted_hub_damping_Nm_per_rad_s: 0.0 # float
    reflected_inertia_kg_m2: 0.0         # float -> drivetrain.input_armature
  servo_step_response:
    fitted_drive_kv: 0.0                 # float
    observed_max_speed_rad_s: 0.0        # float
    observed_stall_torque_Nm: 0.0        # float
  incline_slide:
    floor_material: ""                   # str
    slide_angle_deg: 0.0                 # float -> mu = tan(angle)
  whole_bike_com:
    method: ""                           # str — balance line / scale + moments
    com_pos_mm: [0.0, 0.0, 0.0]          # [float, float, float] — chassis frame
    total_mass_g: 0.0                    # float
  loaded_rolling_radius:
    applied_load_g: 0.0                  # float — weight on the wheel during the test
    distance_per_hub_rev_mm: 0.0         # float -> effective radius = value / (2*pi)
  notes: ""
